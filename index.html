<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WarFront — Europa 1939</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:wght@400;600&display=swap');
:root{
  --bg:#0a0c0f;--panel:#111318;--border:#1e2128;
  --gold:#c8922a;--gold2:#e8b84b;--red:#c0392b;
  --green:#1e8449;--blue:#1a5276;--text:#cfc5aa;--muted:#5a5040;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Text',serif;
  height:100vh;overflow:hidden;display:flex;flex-direction:column;user-select:none;}

/* ── LOBBY ── */
#lobby{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;
  background:radial-gradient(ellipse at 50% 35%,#1c1500 0%,#0a0c0f 70%);}
#lobby::before{content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 49px,#ffffff08 50px),
    repeating-linear-gradient(90deg,transparent,transparent 49px,#ffffff08 50px);pointer-events:none;}
.L-title{font-family:'Cinzel',serif;font-size:clamp(32px,5vw,64px);font-weight:900;
  color:var(--gold2);text-shadow:0 0 60px #c8922a88,0 3px 0 #000;letter-spacing:8px;}
.L-sub{font-family:'Cinzel',serif;font-size:12px;color:var(--muted);letter-spacing:6px;margin-top:-10px;}
.L-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;
  padding:26px 32px;width:min(420px,94vw);position:relative;box-shadow:0 16px 60px #00000099;}
.L-card::before{content:'';position:absolute;top:0;left:16px;right:16px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold)66,transparent);}
.L-h{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;color:var(--gold);
  text-transform:uppercase;margin-bottom:14px;}
.row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.row label{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.row input,.row select{background:#08090b;border:1px solid var(--border);border-radius:3px;
  color:var(--text);padding:8px 11px;font-family:'Crimson Text',serif;font-size:15px;outline:none;
  transition:border-color .18s;}
.row input:focus,.row select:focus{border-color:var(--gold);}
.row select option{background:#08090b;}
.btn{background:var(--gold);color:#000;border:none;border-radius:3px;
  padding:10px 18px;font-family:'Cinzel',serif;font-size:12px;font-weight:700;
  letter-spacing:2px;cursor:pointer;width:100%;margin-top:4px;transition:background .18s;}
.btn:hover{background:var(--gold2);}
.btn:disabled{background:#1a180f;color:#3a3020;cursor:not-allowed;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-outline:hover{background:var(--border);color:var(--text);}
.or{text-align:center;color:var(--muted);font-size:11px;letter-spacing:3px;margin:8px 0;}
#code-box{font-family:monospace;font-size:11px;color:var(--gold2);background:#08090b;
  padding:7px 11px;border-radius:3px;border:1px solid var(--border);word-break:break-all;
  cursor:pointer;transition:border-color .18s;}
#code-box:hover{border-color:var(--gold);}
.slots{display:flex;flex-direction:column;gap:5px;margin-top:6px;}
.slot{display:flex;align-items:center;gap:9px;padding:6px 10px;background:#08090b;
  border-radius:3px;border:1px solid var(--border);font-size:13px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
#lmsg{font-size:12px;color:var(--muted);text-align:center;min-height:16px;margin-top:8px;}
#lmsg2{font-size:11px;color:var(--muted);text-align:center;margin-top:6px;}

/* ── GAME ── */
#game{flex:1;display:none;flex-direction:column;overflow:hidden;}
#game.on{display:flex;}

/* TOP HUD */
#hud{height:44px;background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:0;flex-shrink:0;z-index:10;}
.hud-title{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:3px;
  font-weight:700;padding-right:14px;border-right:1px solid var(--border);margin-right:14px;}
.hud-stat{display:flex;flex-direction:column;align-items:center;padding:0 12px;
  border-right:1px solid var(--border);line-height:1.1;}
.hud-lbl{font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.hud-val{font-size:15px;font-weight:600;color:var(--gold2);}
.hud-val.sm{font-size:11px;color:var(--green);}
#hud-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.hud-timer{font-family:'Cinzel',serif;font-size:11px;color:var(--muted);}
#hud-ping{font-size:10px;color:var(--muted);}

/* CANVAS AREA */
#arena{flex:1;position:relative;overflow:hidden;}
#cv{position:absolute;inset:0;cursor:crosshair;}
#cv.grabbing{cursor:grabbing;}

/* MINIMAP */
#mini{position:absolute;bottom:10px;right:10px;width:180px;height:130px;
  background:#08100a;border:1px solid var(--border);border-radius:3px;z-index:20;opacity:.9;}
#mini-cv{width:100%;height:100%;}

/* SIDEBAR */
#sb{position:absolute;top:0;right:0;bottom:0;width:240px;background:var(--panel);
  border-left:1px solid var(--border);display:flex;flex-direction:column;
  transform:translateX(240px);transition:transform .25s;z-index:15;}
#sb.open{transform:translateX(0);}
#sb-toggle{position:absolute;left:-28px;top:50%;transform:translateY(-50%);
  background:var(--panel);border:1px solid var(--border);border-right:none;
  width:28px;height:56px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:3px 0 0 3px;font-size:14px;color:var(--gold);}
.sb-sec{border-bottom:1px solid var(--border);padding:12px 14px;flex-shrink:0;}
.sb-h{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--gold);
  text-transform:uppercase;margin-bottom:9px;}
#sb-ter-name{font-family:'Cinzel',serif;font-size:14px;color:var(--text);margin-bottom:4px;}
#sb-ter-info{font-size:12px;color:var(--muted);line-height:1.7;}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.ab{background:#08090b;border:1px solid var(--border);border-radius:3px;color:var(--text);
  padding:7px 4px;font-size:12px;cursor:pointer;transition:border-color .15s,background .15s;
  text-align:center;line-height:1.2;}
.ab:hover:not(:disabled){border-color:var(--gold);background:#12100a;}
.ab:disabled{opacity:.3;cursor:not-allowed;}
.ab .s{font-size:9px;color:var(--muted);display:block;margin-top:1px;}
.ab.spawn-active{border-color:var(--green)!important;background:#0a1208!important;}
#sb-tech{overflow-y:auto;flex:1;padding:12px 14px;}
#sb-tech::-webkit-scrollbar{width:3px;}
#sb-tech::-webkit-scrollbar-thumb{background:var(--border);}
.tc{display:flex;align-items:center;gap:8px;padding:7px 9px;background:#08090b;
  border:1px solid var(--border);border-radius:3px;margin-bottom:5px;
  cursor:pointer;transition:border-color .15s;}
.tc:hover:not(.done):not(.locked){border-color:var(--gold);}
.tc.done{border-color:#1e844966;opacity:.6;cursor:default;}
.tc.locked{opacity:.3;cursor:not-allowed;}
.tc-ico{font-size:16px;line-height:1;}
.tc-body{flex:1;min-width:0;}
.tc-name{font-size:12px;font-weight:600;}
.tc-desc{font-size:10px;color:var(--muted);}
.tc-cost{font-size:10px;color:var(--gold);margin-top:1px;}

/* LOG */
#log{height:66px;background:#07080a;border-top:1px solid var(--border);
  overflow-y:auto;padding:4px 10px;flex-shrink:0;}
#log::-webkit-scrollbar{width:3px;}
#log::-webkit-scrollbar-thumb{background:var(--border);}
.ll{font-size:11px;color:var(--muted);line-height:1.65;}
.ll.hi{color:var(--gold2);}
.ll.ok{color:#27ae60;}
.ll.bad{color:#e74c3c;}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--panel);border:1px solid var(--gold);color:var(--text);
  padding:8px 20px;border-radius:3px;font-family:'Cinzel',serif;font-size:11px;
  letter-spacing:1px;opacity:0;transition:opacity .25s;z-index:999;pointer-events:none;}
#toast.on{opacity:1;}

/* VICTORY */
#vic{display:none;position:fixed;inset:0;background:#000000cc;z-index:500;
  flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#vic.on{display:flex;}
.vic-t{font-family:'Cinzel',serif;font-size:clamp(36px,7vw,72px);font-weight:900;
  color:var(--gold2);text-shadow:0 0 80px #e8b84b55;}
.vic-s{font-family:'Cinzel',serif;font-size:16px;color:var(--text);letter-spacing:4px;}

/* Spawn indicator */
#spawn-info{position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(30,132,73,.92);color:#fff;padding:5px 18px;border-radius:3px;
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;
  pointer-events:none;opacity:0;transition:opacity .2s;z-index:50;}
#spawn-info.on{opacity:1;}
</style>
</head>

<!-- ══ LOBBY ══ -->
<div id="lobby">

      <div class="row"><label>Name</label><input id="i-name" maxlength="16" value="General" placeholder="Name..."></div>
      <div class="row"><label>Nation</label>
        <select id="i-nation">
          <option value="DE">🇩🇪 Deutschland</option>
          <option value="FR">🇫🇷 Frankreich</option>
          <option value="GB">🇬🇧 Großbrit.</option>
          <option value="SU">🇷🇺 Sowjetunion</option>
          <option value="IT">🇮🇹 Italien</option>
          <option value="PL">🇵🇱 Polen</option>
          <option value="ES">🇪🇸 Spanien</option>
          <option value="HU">🇭🇺 Ungarn</option>
        </select>
      </div>
    </div>
    <div class="row"><label>Spieleranzahl (Host)</label>
      <select id="i-total"><option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option>
        <option value="6">6</option><option value="7">7</option><option value="8">8</option>
      </select>
    </div>
    <button class="btn" onclick="doHost()">HOST — SPIEL ERSTELLEN</button>
    <div class="or">— oder —</div>
    <div class="row"><label>Host-Code (Beitreten)</label>
      <input id="i-join" placeholder="Code eingeben..." style="font-family:monospace;font-size:12px;"></div>
    <button class="btn btn-outline" onclick="doJoin()">BEITRETEN</button>
    <div class="or">— oder —</div>
    <button class="btn btn-outline" onclick="doSolo()">SOLO GEGEN KI (F1)</button>
    <div id="lmsg"></div>
  </div>

  <div class="L-card" id="card-wait" style="display:none;">
    <div class="L-h">Warte auf Spieler</div>
    <div class="row"><label>Host-Code (klicken → kopieren)</label>
      <div id="code-box" onclick="copyCode()">Verbinde...</div></div>
    <div class="slots" id="slot-list"></div>
    <button class="btn" id="btn-start" onclick="doStart()" disabled style="margin-top:12px;">SPIEL STARTEN</button>
    <div id="lmsg2"></div>
  </div>
</div>

<!-- ══ GAME ══ -->
<div id="game">
  <div id="hud">
    <div class="hud-title">WARFRONT</div>
    <div class="hud-stat"><div class="hud-lbl">Gold</div><div class="hud-val" id="h-gold">0</div></div>
    <div class="hud-stat"><div class="hud-lbl">Industrie</div><div class="hud-val" id="h-prod">0</div></div>
    <div class="hud-stat"><div class="hud-lbl">Zellen</div><div class="hud-val" id="h-cells">0</div></div>
    <div class="hud-stat" style="border-right:none;">
      <div class="hud-lbl">Einnahmen</div>
      <div class="hud-val sm" id="h-inc">+0🪙</div>
    </div>
    <div id="hud-right">
      <div class="hud-timer" id="h-time">⏱ 00:00</div>
      <div id="hud-ping"></div>
    </div>
  </div>

  <div id="arena">
    <canvas id="cv"></canvas>
    <div id="spawn-info">🏃 Klicke eine eigene Zelle — Truppen spawnen dort</div>
    <div id="mini"><canvas id="mini-cv"></canvas></div>

    <!-- SIDEBAR -->
    <div id="sb">
      <div id="sb-toggle" onclick="toggleSB()">◀</div>
      <div class="sb-sec">
        <div class="sb-h">Gebiet</div>
        <div id="sb-ter-name" style="color:var(--muted);font-size:12px;">Nichts gewählt</div>
        <div id="sb-ter-info"></div>
      </div>
      <div class="sb-sec" id="sb-actions" style="display:none;">
        <div class="sb-h">Einheiten spawnen</div>
        <div class="act-grid" id="act-grid"></div>
      </div>
      <div id="sb-tech">
        <div class="sb-h" style="margin-bottom:9px;">Forschung</div>
        <div id="tech-list"></div>
      </div>
    </div>
  </div>
  <div id="log"><div id="log-i"></div></div>
</div>

<div id="toast"></div>
<div id="vic"><div class="vic-t">SIEG!</div><div class="vic-s" id="vic-s"></div>
  <button class="btn" style="width:180px;margin-top:12px;" onclick="location.reload()">NEUES SPIEL</button></div>

// ══════════════════════════════════════════════
// PEER / LOBBY
// ══════════════════════════════════════════════
function makePeer(cb){
  peer=new Peer(undefined,{debug:0});
  peer.on('open',id=>{cb(id);});
  peer.on('connection',c=>{wire(c);});
  peer.on('error',e=>{setLM('Fehler: '+e.message,true);});
}
function wire(c){
  c.on('open',()=>{
    conns[c.peer]=c;
    if(isHost){
      lobbyP.push({peerId:c.peer,name:'...',nation:'?'});
      c.send({t:'assign',idx:lobbyP.length,total:totalP});
      broadL(); updateSlots(); checkStart();
    }
  });
  c.on('data',d=>onMsg(d,c.peer));
  c.on('close',()=>{delete conns[c.peer];});
}
function bcast(m){Object.values(conns).forEach(c=>{try{c.send(m);}catch(e){}});}
function broadL(){bcast({t:'lobby',peers:lobbyP});}
function onMsg(d,from){
  if(d.t==='assign'){myIdx=d.idx;totalP=d.total;}
  else if(d.t==='lobby'){lobbyP=d.peers;updateSlots();}
  else if(d.t==='info'){const p=lobbyP.find(x=>x.peerId===from);if(p){p.name=d.name;p.nation=d.nation;}broadL();updateSlots();checkStart();}
  else if(d.t==='start'){launch(d.state);}
  else if(d.t==='net'){netApply(d);}
}

function doHost(){
  myName=v('i-name')||'General';myNation=v('i-nation');totalP=+v('i-total');
  isHost=true;myIdx=0;
  show('card-main',false);show('card-wait',true);
  makePeer(id=>{el('code-box').textContent=id;lobbyP=[{peerId:id,name:myName,nation:myNation}];updateSlots();checkStart();});
}
function doJoin(){
  myName=v('i-name')||'General';myNation=v('i-nation');
  const hid=v('i-join').trim();if(!hid){setLM('Host-Code eingeben!');return;}
  isHost=false;show('card-main',false);show('card-wait',true);el('btn-start').style.display='none';
  makePeer(()=>{const c=peer.connect(hid);wire(c);c.on('open',()=>{c.send({t:'info',name:myName,nation:myNation});setLM2('Verbunden! Warte auf Host...');});});
}
function doSolo(){
  myName=v('i-name')||'General';myNation=v('i-nation');
  myIdx=0;isHost=true;aiOn=true;totalP=2;
  const state=buildState([{name:myName,nation:myNation,color:COLORS[0]},{name:'KI — Frankreich',nation:'FR',color:COLORS[1]}]);
  launch(state);
}
function doStart(){
  if(!isHost)return;
  const defs=[{name:myName,nation:myNation},...lobbyP.slice(1).map(p=>({name:p.name,nation:p.nation}))].slice(0,totalP);
  const pds=defs.map((d,i)=>({name:d.name,nation:d.nation,color:COLORS[i]}));
  const state=buildState(pds);
  launch(state);bcast({t:'start',state});
}
function updateSlots(){
  const all=[{peerId:peer?.id,name:myName,nation:myNation},...lobbyP.slice(1)];
  el('slot-list').innerHTML=Array.from({length:totalP},(_,i)=>{
    const p=all[i];
    return`<div class="slot"><div class="dot" style="background:${COLORS[i]}"></div>
      <span>${p?p.name:'—'}</span><span style="margin-left:auto;font-size:11px;color:var(--muted)">${p?p.nation:''}</span></div>`;
  }).join('');
}
function checkStart(){
  const n=Object.keys(conns).length;
  el('btn-start').disabled=n<totalP-1;
  setLM2(`${n+1}/${totalP} verbunden`);
}
function copyCode(){navigator.clipboard.writeText(el('code-box').textContent).then(()=>toast('Code kopiert!'));}

// ══════════════════════════════════════════════
// STATE BUILDER
// ══════════════════════════════════════════════
function buildState(playerDefs){
  const players=playerDefs.map(pd=>({
    name:pd.name,nation:pd.nation,color:pd.color,
    gold:30,prod:0,res:[],ub:{},ul:['infantry'],ib:0,para:false,spd:1,
  }));
  const cells={};
  REGIONS.forEach(r=>{cells[r.id]={owner:-1,hp:100};});
  players.forEach((pl,i)=>{
    (NATION_STARTS[pl.nation]||[REGIONS[i].id]).forEach(rid=>{
      if(cells[rid]){cells[rid].owner=i;cells[rid].hp=100;}
    });
  });
  return{players,cells,units:[],t:Date.now(),elapsed:0};
}

// ══════════════════════════════════════════════
function launch(state){
  G={...state,units:state.units||[]};
  el('lobby').style.display='none';
  el('game').classList.add('on');
  cv=el('cv');ctx=cv.getContext('2d');
  miniCv=el('mini-cv');miniCtx=miniCv.getContext('2d');
  resize();
  window.addEventListener('resize',resize);
  cv.addEventListener('mousedown',onMD);
  cv.addEventListener('mousemove',onMM);
  cv.addEventListener('mouseup',onMU);
  cv.addEventListener('wheel',onWheel,{passive:false});
  cv.addEventListener('click',onClick);
  cv.addEventListener('contextmenu',e=>{e.preventDefault();cancelSpawn();});
  gameStartTime=Date.now();lastIncome=Date.now();
  animId=requestAnimationFrame(loop);
  addLog('Das Spiel beginnt!','hi');
  if(aiOn&&G.t!==myIdx)setTimeout(aiTick,1500);
  renderTech();
  document.addEventListener('keydown',e=>{if(e.key==='Escape')cancelSpawn();});
}

function resize(){
  W=cv.width=cv.offsetWidth;H=cv.height=cv.offsetHeight;
  miniCv.width=miniCv.offsetWidth;miniCv.height=miniCv.offsetHeight;
  // Center map initially
  if(vx===0&&vy===0){
    vx=(W-1000*vz)/2; vy=(H-860*vz)/2;
  }
}

// ══════════════════════════════════════════════
// GAME LOOP
// ══════════════════════════════════════════════
let lastFrame=0;
function loop(ts){
  animId=requestAnimationFrame(loop);
  const dt=Math.min(ts-lastFrame,50);lastFrame=ts;
  G.elapsed+=dt;

  // Income tick
  if(Date.now()-lastIncome>INCOME_INTERVAL){
    lastIncome=Date.now();
    collectIncome();
  }

  updateUnits(dt);
  draw();
  drawMini();
  updateHUD();

  if(aiOn&&myIdx!==0)aiTick();
}

// ══════════════════════════════════════════════
// INCOME
// ══════════════════════════════════════════════
function collectIncome(){
  G.players.forEach((p,i)=>{
    const owned=REGIONS.filter(r=>G.cells[r.id]?.owner===i);
    const gr=owned.reduce((s,r)=>s+r.income,0);
    const pr=owned.reduce((s,r)=>s+Math.ceil(r.income*0.4),0)+(p.ib||0);
    p.gold+=gr; p.prod+=pr;
    if(i===myIdx) addLog(`Einnahmen: +${gr}🪙 +${pr}⚙️`);
  });
  if(isHost) bcast({t:'net',a:'income',players:G.players.map(p=>({gold:p.gold,prod:p.prod}))});
}

// ══════════════════════════════════════════════
// UNIT UPDATE
// ══════════════════════════════════════════════
function updateUnits(dt){
  G.units.forEach(u=>{
    if(!u.moving)return;
    const dx=u.tx-u.x, dy=u.ty-u.y;
    const dist=Math.hypot(dx,dy);
    if(dist<1.5){
      u.x=u.tx;u.y=u.ty;u.moving=false;
      // Arrive at target cell
      if(u.targetCell!=null){
        const cell=G.cells[u.targetCell];
        const region=REGIONS.find(r=>r.id===u.targetCell);
        if(cell){
          if(cell.owner===u.owner){
            // Reinforce — just stop
          } else {
            // Combat
            const defStr=cellDefStr(u.targetCell);
            const myStr=unitAtk(u);
            if(myStr>defStr*0.7+Math.random()*defStr*0.5){
              // Capture
              const prev=cell.owner;
              cell.owner=u.owner;cell.hp=50;
              addLog(`${G.players[u.owner].name} erobert ${region?.name||u.targetCell}!`,'ok');
              checkVictory();
              if(isHost)bcast({t:'net',a:'capture',cell:u.targetCell,owner:u.owner});
            } else {
              // Repelled — unit takes damage
              u.hp-=5+Math.random()*8;
              if(u.hp<=0){G.units=G.units.filter(x=>x!==u);}
              addLog(`Angriff auf ${region?.name} abgewehrt`,'bad');
            }
          }
        }
      }
      u.targetCell=null;
    } else {
      const speed=u.spd*(G.players[u.owner]?.spd||1);
      const step=speed*dt/1000;
      u.x+=dx/dist*step; u.y+=dy/dist*step;
    }
  });
  // Remove dead units
  G.units=G.units.filter(u=>u.hp>0);
}

function cellDefStr(rid){
  const defenders=G.units.filter(u=>u.targetCell===rid||(!u.moving&&ptInRegion(u.x,u.y,rid)));
  return defenders.reduce((s,u)=>s+unitAtk(u),0)||2;
}
function unitAtk(u){
  const p=G.players[u.owner];
  return u.atk*(p?.ub?.[u.type]||1);
}

// ══════════════════════════════════════════════
// DRAW
// ══════════════════════════════════════════════
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=SEA;ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(vx,vy);ctx.scale(vz,vz);

  // Draw regions
  REGIONS.forEach(r=>{
    const cell=G.cells[r.id];
    const owner=cell?.owner>=0?cell.owner:-1;
    const col=owner>=0?G.players[owner]?.color:NEUTRAL;

    r.subs.forEach(sub=>{
      const pts=parsePts(sub);
      ctx.beginPath();
      pts.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));
      ctx.closePath();
      ctx.fillStyle=col;
      ctx.fill();
      // Border
      ctx.strokeStyle='rgba(0,0,0,0.55)';
      ctx.lineWidth=1/vz;
      ctx.stroke();
      // Selected highlight
      if(r.id===selectedRegion){
        ctx.strokeStyle='rgba(255,255,255,0.7)';
        ctx.lineWidth=2.5/vz;
        ctx.stroke();
      }
    });

    // Label
    ctx.font=`bold ${Math.max(7,9/vz)}px Cinzel,serif`;
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='#000';ctx.shadowBlur=4/vz;
    ctx.fillText(r.name.substring(0,8).toUpperCase(),r.cx,r.cy-6);
    ctx.shadowBlur=0;

    // Income label
    ctx.font=`${Math.max(6,8/vz)}px Crimson Text,serif`;
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText(r.income+'🪙',r.cx,r.cy+7);
  });

  // Spawn mode target highlights
  if(spawnMode){
    REGIONS.forEach(r=>{
      const cell=G.cells[r.id];
      if(cell?.owner===myIdx||(G.players[myIdx]?.para&&cell?.owner!==myIdx)){
        r.subs.forEach(sub=>{
          const pts=parsePts(sub);
          ctx.beginPath();
          pts.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));
          ctx.closePath();
          ctx.strokeStyle=cell?.owner===myIdx?'rgba(30,200,80,0.7)':'rgba(200,80,30,0.6)';
          ctx.lineWidth=2/vz;ctx.stroke();
        });
      }
    });
  }

  // Draw units
  G.units.forEach(u=>{
    const p=G.players[u.owner];
    const col=p?.color||'#fff';
    // Shadow
    ctx.beginPath();ctx.arc(u.x,u.y+2,u.r,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fill();
    // Body
    ctx.beginPath();ctx.arc(u.x,u.y,u.r,0,Math.PI*2);
    ctx.fillStyle=u.ucolor||col;ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=1.5/vz;ctx.stroke();
    // HP bar
    const bw=u.r*2.2,bh=2/vz;
    const bx=u.x-bw/2,by=u.y-u.r-4/vz;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=u.hp/u.maxhp>0.5?'#27ae60':'#c0392b';
    ctx.fillRect(bx,by,bw*(u.hp/u.maxhp),bh);
    // Icon
    ctx.font=`${Math.max(5,u.r*1.1)}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(UDEFS[u.type]?.em?.replace(/[\uFE0F\u20E3]/g,'')||'',u.x,u.y);
  });

  ctx.restore();
}

function drawMini(){
  miniCtx.clearRect(0,0,miniCv.width,miniCv.height);
  const sx=miniCv.width/1000,sy=miniCv.height/860;
  miniCtx.fillStyle=SEA;miniCtx.fillRect(0,0,miniCv.width,miniCv.height);
  REGIONS.forEach(r=>{
    const cell=G.cells[r.id];
    const owner=cell?.owner>=0?cell.owner:-1;
    miniCtx.fillStyle=owner>=0?G.players[owner]?.color:NEUTRAL;
    r.subs.forEach(sub=>{
      const pts=parsePts(sub);
      miniCtx.beginPath();
      pts.forEach((p,i)=>i?miniCtx.lineTo(p[0]*sx,p[1]*sy):miniCtx.moveTo(p[0]*sx,p[1]*sy));
      miniCtx.closePath();miniCtx.fill();
      miniCtx.strokeStyle='rgba(0,0,0,0.4)';miniCtx.lineWidth=0.5;miniCtx.stroke();
    });
  });
  // Viewport rect
  miniCtx.strokeStyle='rgba(255,255,255,0.4)';miniCtx.lineWidth=1;
  miniCtx.strokeRect(-vx/vz*sx,-vy/vz*sy,W/vz*sx,H/vz*sy);
}

function updateSidebar(rid){
  if(!rid){el('sb-ter-name').textContent='Nichts gewählt';el('sb-ter-name').style.color='var(--muted)';el('sb-ter-info').textContent='';el('sb-actions').style.display='none';return;}
  const r=REGIONS.find(x=>x.id===rid);
  const cell=G.cells[rid];
  const owner=cell?.owner>=0?G.players[cell.owner]:null;
  el('sb-ter-name').textContent=r?.name||rid;
  el('sb-ter-name').style.color=owner?.color||'var(--muted)';
  const myUnits=G.units.filter(u=>u.owner===myIdx&&ptInRegion(u.x,u.y,rid));
  el('sb-ter-info').innerHTML=
    `<b>Besitzer:</b> ${owner?`<span style="color:${owner.color}">${owner.name}</span>`:'Neutral'}<br>
     <b>Einkommen:</b> ${r?.income||0}🪙/Runde<br>
     <b>Eigene Truppen hier:</b> ${myUnits.length}`;
  if(cell?.owner===myIdx){
    el('sb-actions').style.display='block';
    const me=G.players[myIdx];
    el('act-grid').innerHTML=me.ul.map(ut=>{
      const u=UDEFS[ut];
      const ok=me.gold>=u.gold&&me.prod>=u.prod;
      return`<button class="ab${spawnMode===ut?' spawn-active':''}" onclick="setSpawn('${ut}')" ${ok?'':'disabled'}>
        ${u.em} ${u.name}<span class="s">${u.gold}🪙 ${u.prod?u.prod+'⚙️':''}</span></button>`;
    }).join('');
  } else {
    el('sb-actions').style.display='none';
  }
}
function toggleSB(){sbOpen=!sbOpen;el('sb').classList.toggle('open',sbOpen);el('sb-toggle').textContent=sbOpen?'▶':'◀';}
function openSB(){if(!sbOpen)toggleSB();}

function renderTech(){
  const me=G.players[myIdx];if(!me)return;
  el('tech-list').innerHTML=TECHS.map(tc=>{
    const done=me.res.includes(tc.id);
    const locked=tc.req&&!me.res.includes(tc.req);
    const ok=!done&&!locked&&me.prod>=tc.cost;
    return`<div class="tc${done?' done':locked?' locked':''}" onclick="${(!done&&!locked)?`doResearch('${tc.id}')`:''}" style="cursor:${(!done&&!locked)?'pointer':'default'}">
      <div class="tc-ico">${tc.em}</div>
      <div class="tc-body">
        <div class="tc-name">${tc.name}${done?' ✓':''}</div>
        <div class="tc-desc">${tc.desc}</div>
        ${!done?`<div class="tc-cost">${tc.cost}⚙️${ok?' ✅':''}${locked?' 🔒':''}</div>`:''}
      </div></div>`;
  }).join('');
}

// ══════════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════════
let panMoved=false;
function onMD(e){
  dragging=true;dragSX=e.clientX-vx;dragSY=e.clientY-vy;panMoved=false;
  cv.classList.add('grabbing');
}
function onMM(e){
  if(!dragging)return;
  const nx=e.clientX-dragSX,ny=e.clientY-dragSY;
  if(Math.abs(nx-vx)>3||Math.abs(ny-vy)>3)panMoved=true;
  vx=nx;vy=ny;
}
function onMU(){dragging=false;cv.classList.remove('grabbing');}
function onWheel(e){
  e.preventDefault();
  const oz=vz;
  vz=Math.max(0.35,Math.min(5,vz-e.deltaY*0.0012));
  // Zoom toward mouse
  const mx=e.offsetX,my=e.offsetY;
  vx=mx-(mx-vx)*(vz/oz);
  vy=my-(my-vy)*(vz/oz);
}

function onClick(e){
  if(panMoved)return;
  const mx=(e.offsetX-vx)/vz,my=(e.offsetY-vy)/vz;
  const hit=regionAt(mx,my);
  if(spawnMode){
    if(hit){
      const cell=G.cells[hit];
      const me=G.players[myIdx];
      const canSpawn=cell.owner===myIdx||(me.para&&cell.owner>=0&&cell.owner!==myIdx);
      if(canSpawn){
        doSpawnUnit(hit,spawnMode);
      } else {
        toast('Nur auf eigenen Gebieten spawnen!');
      }
    }
    cancelSpawn();
    return;
  }
  if(hit){selectedRegion=hit;updateSidebar(hit);openSB();}
}

// ══════════════════════════════════════════════
// SPAWN & MOVE UNITS
// ══════════════════════════════════════════════
function setSpawn(type){
  spawnMode=type;
  el('spawn-info').classList.add('on');
  toast('Klicke ein Gebiet um '+UDEFS[type].name+' zu spawnen');
  updateSidebar(selectedRegion);
}
function cancelSpawn(){
  spawnMode=null;el('spawn-info').classList.remove('on');
  updateSidebar(selectedRegion);
}

function doSpawnUnit(rid,type,fromNet=false){
  const owner=fromNet||myIdx;
  const me=G.players[owner];
  const u=UDEFS[type];
  if(!fromNet&&(me.gold<u.gold||me.prod<u.prod)){toast('Zu wenig Ressourcen!');return;}
  if(!fromNet){me.gold-=u.gold;me.prod=Math.max(0,me.prod-u.prod);}
  const r=REGIONS.find(x=>x.id===rid);
  const {x,y}=regionSpawnPoint(rid);
  const uid=unitIdCtr++;
  const unit={
    id:uid,owner,type,x,y,tx:x,ty:y,
    hp:u.hp*10,maxhp:u.hp*10,atk:u.atk,spd:u.spd,r:u.r,
    ucolor:u.color,moving:false,targetCell:null,
  };
  G.units.push(unit);
  addLog(`${me.name} spawnt ${u.em} ${u.name} in ${r?.name||rid}`);
  if(isHost&&!fromNet){bcast({t:'net',a:'spawn',rid,type,owner,uid,x,y});}
  renderTech();
}

function netApply(d){
  if(d.a==='income'){
    d.players.forEach((p,i)=>{if(i!==myIdx){G.players[i].gold=p.gold;G.players[i].prod=p.prod;}});
  }
  else if(d.a==='spawn'){
    const u=UDEFS[d.type];
    const unit={id:d.uid,owner:d.owner,type:d.type,x:d.x,y:d.y,tx:d.x,ty:d.y,
      hp:u.hp*10,maxhp:u.hp*10,atk:u.atk,spd:u.spd,r:u.r,ucolor:u.color,moving:false,targetCell:null};
    G.units.push(unit);
  }
  else if(d.a==='move'){
    const u=G.units.find(x=>x.id===d.uid);
    if(u){u.tx=d.tx;u.ty=d.ty;u.moving=true;u.targetCell=d.cell||null;}
  }
  else if(d.a==='capture'){
    const cell=G.cells[d.cell];if(cell)cell.owner=d.owner;
  }
  else if(d.a==='res'){
    const p=G.players[d.owner];const tc=TECHS.find(x=>x.id===d.tech);
    if(p&&tc&&!p.res.includes(d.tech)){p.prod-=tc.cost;p.res.push(d.tech);tc.apply(p);}
  }
}

// ══════════════════════════════════════════════
// RESEARCH
// ══════════════════════════════════════════════
function doResearch(techId){
  const me=G.players[myIdx];
  const tc=TECHS.find(x=>x.id===techId);
  if(!tc||me.res.includes(techId))return;
  if(tc.req&&!me.res.includes(tc.req)){toast('Voraussetzung fehlt!');return;}
  if(me.prod<tc.cost){toast('Zu wenig Industrie!');return;}
  me.prod-=tc.cost;me.res.push(techId);tc.apply(me);
  addLog(`${me.name} erforscht: ${tc.em} ${tc.name}`,'hi');
  bcast({t:'net',a:'res',owner:myIdx,tech:techId});
  renderTech();
}

// ══════════════════════════════════════════════
// VICTORY
// ══════════════════════════════════════════════
function checkVictory(){
  const owners=new Set(Object.values(G.cells).map(c=>c.owner).filter(o=>o>=0));
  if(owners.size===1){
    const w=G.players[[...owners][0]];
    el('vic').classList.add('on');
    el('vic-s').textContent=`${w.name} hat Europa befriedet!`;
  }
}

// ══════════════════════════════════════════════
// AI
// ══════════════════════════════════════════════
let aiLastTick=0;
function aiTick(){
  const now=Date.now();
  if(now-aiLastTick<3000)return;
  aiLastTick=now;
  const aiIdx=myIdx===0?1:0;
  const ai=G.players[aiIdx];if(!ai)return;

  // Buy infantry in random owned region
  if(ai.gold>=UDEFS.infantry.gold){
    const owned=REGIONS.filter(r=>G.cells[r.id]?.owner===aiIdx);
    if(owned.length>0){
      const r=owned[Math.floor(Math.random()*owned.length)];
      doSpawnUnit(r.id,'infantry',aiIdx);
    }
  }

  // Move units toward enemy
  const aiUnits=G.units.filter(u=>u.owner===aiIdx&&!u.moving);
  aiUnits.slice(0,3).forEach(u=>{
    // Find nearest enemy region
    let best=null,bd=Infinity;
    REGIONS.forEach(r=>{
      const c=G.cells[r.id];
      if(!c||c.owner===aiIdx)return;
      const d=Math.hypot(r.cx-u.x,r.cy-u.y);
      if(d<bd){bd=d;best=r;}
    });
    if(best){
      const sp=regionSpawnPoint(best.id);
      u.tx=sp.x+rnd(-8,8);u.ty=sp.y+rnd(-8,8);
      u.moving=true;u.targetCell=best.id;
    }
  });
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function parsePts(s){return s.trim().split(/\s+/).map(p=>{const[a,b]=p.split(',');return[+a,+b];});}

function regionAt(x,y){
  for(let i=REGIONS.length-1;i>=0;i--){
    const r=REGIONS[i];
    for(const sub of r.subs){
      if(ptInPoly(x,y,parsePts(sub)))return r.id;
    }
  }
  return null;
}

function ptInPoly(x,y,pts){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i][0],yi=pts[i][1],xj=pts[j][0],yj=pts[j][1];
    if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}

function ptInRegion(x,y,rid){
  const r=REGIONS.find(r=>r.id===rid);
  if(!r)return false;
  return r.subs.some(sub=>ptInPoly(x,y,parsePts(sub)));
}

function regionSpawnPoint(rid){
  const r=REGIONS.find(x=>x.id===rid);
  if(!r)return{x:500,y:400};
  return{x:r.cx+rnd(-10,10),y:r.cy+rnd(-10,10)};
}

function rnd(a,b){return a+Math.random()*(b-a);}

function el(id){return document.getElementById(id);}
function v(id){return el(id).value;}
function show(id,s){el(id).style.display=s?'block':'none';}

function addLog(m,cls=''){
  const d=el('log-i');
  const e=document.createElement('div');
  e.className='ll '+cls;e.textContent=m;
  d.appendChild(e);
  el('log').scrollTop=9999;
}

let _tt=null;
function toast(m){
  el('toast').textContent=m;el('toast').classList.add('on');
  clearTimeout(_tt);_tt=setTimeout(()=>el('toast').classList.remove('on'),2200);
}

// F1 = solo
document.addEventListener('keydown',e=>{if(e.key==='F1'){e.preventDefault();doSolo();}});
</script>
